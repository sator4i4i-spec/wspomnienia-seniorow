<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Eliadora</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #D6C9A8;
  font-family: 'Source Sans 3', 'Segoe UI', Tahoma, sans-serif;
  height: 100vh; overflow: hidden;
}
/* Vignette overlay on the tree area */
#tree-container::after {
  content: '';
  position: absolute; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(60,35,10,0.28) 100%);
  pointer-events: none; z-index: 1;
}
#tree-container { position: relative; }

/* ─── HEADER ───────────────────────────────────────────────────────────────── */
#app-header {
  background: linear-gradient(135deg, #1A0E06 0%, #2E1C10 45%, #2E1C10 55%, #1A0E06 100%);
  color: #F0E6D0; padding: 0 24px; display: flex; align-items: center;
  justify-content: space-between; height: 62px;
  border-bottom: 1px solid #6B4F1A;
  box-shadow: 0 3px 16px rgba(0,0,0,0.45);
  position: relative; z-index: 10;
}
/* Thin gold line at very bottom of header */
#app-header::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 1px; background: linear-gradient(to right, transparent, #C8960A 20%, #C8960A 80%, transparent);
}
#title-block { display: flex; flex-direction: column; justify-content: center; gap: 3px; }
#family-title {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 20px; font-weight: 600;
  color: #E8C56A; letter-spacing: 1.5px; line-height: 1;
}
#app-brand {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 9px; font-weight: 400; font-style: italic;
  color: #A89060; letter-spacing: 3.5px; text-transform: uppercase;
}
#lang-switcher { display: flex; gap: 6px; align-items: center; }
.lang-btn {
  background: transparent; border: 1px solid #4A3020; color: #A08858;
  padding: 4px 10px; cursor: pointer; font-size: 10px; letter-spacing: 1.5px;
  border-radius: 2px; transition: all 0.18s;
  font-family: 'Source Sans 3', sans-serif; font-weight: 600;
}
.lang-btn:hover  { background: #3A2010; border-color: #8B6914; color: #F0DEB0; }
.lang-btn.active { background: #6A4808; border-color: #C8960A; color: #F5E8C0; }

/* ─── TREE CONTAINER ───────────────────────────────────────────────────────── */
#tree-container { width: 100%; height: calc(100vh - 62px); overflow-x: auto; overflow-y: auto; }
#tree-svg { display: block; }
#tree-svg image { overflow: hidden; }
.card-g { cursor: pointer; }

/* Orphaned people indicator */
#orphan-btn {
  display: none; position: fixed;
  bottom: 20px; left: 20px;
  background: #5A3E10; color: #F0E0C0;
  border: 1px solid #8B6914; border-radius: 16px;
  padding: 6px 16px; font-size: 11px; font-weight: 600;
  cursor: pointer; z-index: 300;
  box-shadow: 0 2px 12px rgba(0,0,0,0.3);
  font-family: 'Source Sans 3', sans-serif; letter-spacing: 0.5px;
  transition: all 0.15s;
}
#orphan-btn:hover { background: #6A4810; }

/* ─── SIDEBAR ──────────────────────────────────────────────────────────────── */
#sidebar {
  position: fixed; top: 62px; right: 0;
  width: 33vw; min-width: 270px; max-width: 440px;
  height: calc(100vh - 62px);
  background: #FAF5EC;
  border-left: 1px solid #C8A860;
  box-shadow: -6px 0 28px rgba(0,0,0,0.12);
  transform: translateX(calc(100% - 36px));
  transition: transform 0.40s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 200; display: flex; overflow: hidden;
}
#sidebar.open { transform: translateX(0); }
#sidebar::after { display: none; }
#sb-toggle {
  flex-shrink: 0; width: 36px;
  background: #EFE3C8; border: none;
  border-right: 1px solid #C8A860;
  cursor: pointer; color: #6A4808; font-size: 12px;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; position: relative; z-index: 1;
}
#sb-toggle:hover { background: #E2D0A0; }
#sb-arrow { font-style: normal; line-height: 1; }
#sb-scroll { flex: 1; overflow-y: auto; overflow-x: hidden; }
#sb-inner {
  padding: 28px 22px 48px;
  display: flex; flex-direction: column; align-items: center;
}

/* ─── SIDEBAR CONTENT ──────────────────────────────────────────────────────── */
#sb-photo-wrap { margin-bottom: 16px; position: relative; }
#sb-vid-controls {
  display: flex; align-items: center; gap: 8px;
  margin-top: 8px; padding: 6px 10px;
  background: #1e1208; border-radius: 6px;
  border: 1px solid #5A3A08;
  width: 100%; box-sizing: border-box;
}
#sb-vid-play {
  background: none; border: 1px solid #8B6914; color: #D4A840;
  border-radius: 50%; width: 28px; height: 28px; min-width: 28px;
  font-size: 11px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; flex-shrink: 0;
}
#sb-vid-play:hover { background: #3A2010; }
#sb-vid-vol-icon { color: #8B6914; font-size: 14px; flex-shrink: 0; cursor: pointer; }
#sb-vid-vol {
  flex: 1; -webkit-appearance: none; appearance: none;
  height: 3px; border-radius: 2px;
  background: #3A2810; outline: none; cursor: pointer;
  accent-color: #D4A840;
}
#sb-vid-vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 13px; height: 13px;
  border-radius: 50%; background: #D4A840; cursor: pointer;
}
#sb-fullname {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px; font-weight: 600;
  color: #1E1008; text-align: center;
  margin: 0 0 8px; line-height: 1.25;
  letter-spacing: 0.3px;
}
#sb-info {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 12px; font-weight: 300;
  color: #6A5540; text-align: center;
  margin-bottom: 24px; line-height: 2.0;
  letter-spacing: 0.2px;
}
#sb-info .sb-age {
  display: inline-block;
  background: #DFC870; color: #4A3008;
  border-radius: 10px; padding: 2px 12px;
  font-size: 11px; font-weight: 600;
  margin-top: 4px; letter-spacing: 0.5px;
  font-family: 'Source Sans 3', sans-serif;
}
.sb-section { width: 100%; margin-bottom: 24px; }
.sb-section-title {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 8.5px; font-weight: 600;
  letter-spacing: 3px; text-transform: uppercase;
  color: #A08040; margin-bottom: 10px;
  padding-bottom: 6px; border-bottom: 1px solid #D8C090; width: 100%;
}
#sb-bio-text {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 13px; font-weight: 300; line-height: 1.85;
  white-space: pre-wrap; color: #2C1E10;
}
#sb-gallery-grid {
  display: grid; grid-template-columns: repeat(3, 1fr);
  gap: 8px; width: 100%;
}
.sb-thumb {
  aspect-ratio: 1; border-radius: 6px; overflow: hidden;
  cursor: pointer; background: #DDD0B0;
  border: 1px solid #C0A070;
  transition: opacity 0.15s, transform 0.15s;
}
.sb-thumb:hover { opacity: 0.82; transform: scale(1.04); }
.sb-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
#sb-no-photos {
  font-size: 12px; color: #A89878; font-style: italic;
  font-family: 'Source Sans 3', sans-serif; font-weight: 300;
  text-align: center; padding: 12px 0; width: 100%;
}

/* ─── MUSIC PLAYER (header inline) ─────────────────────────────────────────── */
#music-player {
  display: flex; align-items: center; gap: 8px; flex-shrink: 0;
}
#music-player.hidden { display: none; }
#music-toggle {
  background: none; border: 1px solid #8B6914; color: #D4A840;
  border-radius: 50%; width: 26px; height: 26px; min-width: 26px;
  font-size: 12px; cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: background 0.15s;
}
#music-toggle:hover { background: #3A2010; }
#music-vol-wrap {
  display: flex; align-items: center; gap: 6px; flex-shrink: 0;
}
#music-vol-icon { color: #8B6914; font-size: 13px; cursor: pointer; user-select: none; }
#music-vol {
  -webkit-appearance: none; appearance: none;
  width: 80px; height: 3px; border-radius: 2px;
  background: #3A2810; outline: none; cursor: pointer;
  accent-color: #D4A840;
}
#music-vol::-webkit-slider-thumb {
  -webkit-appearance: none; width: 12px; height: 12px;
  border-radius: 50%; background: #D4A840; cursor: pointer;
  box-shadow: 0 0 3px rgba(0,0,0,0.4);
}

/* ─── BACK TO MENU BUTTON ──────────────────────────────────────────────────── */
#back-btn {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 300;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 11px; font-style: italic; letter-spacing: 1.8px;
  color: #8B7040; background: rgba(245,237,210,0.88);
  border: 1px solid #C8A860; border-radius: 2px;
  padding: 5px 18px; cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.18s, color 0.18s;
  text-decoration: none; display: inline-block;
}
#back-btn:hover { background: rgba(232,215,170,0.96); color: #4A3010; }
body.has-music #back-btn { bottom: 14px; }

/* ─── PER-TREE COLOUR THEMES ───────────────────────────────────────────────── */

/* Tolkien / Hobbits — forest green */
body[data-theme="hobbits"] { background: #D5DEC5; }
body[data-theme="hobbits"] #app-header {
  background: linear-gradient(135deg, #060E08 0%, #101E12 45%, #101E12 55%, #060E08 100%);
  border-bottom-color: #1A4A1A;
}
body[data-theme="hobbits"] #app-header::after {
  background: linear-gradient(to right, transparent, #2D5A1E 20%, #2D5A1E 80%, transparent);
}
body[data-theme="hobbits"] #family-title { color: #A0D098; }
body[data-theme="hobbits"] #sidebar { background: #F2F7EE; border-left-color: #90B880; }
body[data-theme="hobbits"] #sb-toggle { background: #E4EED8; border-right-color: #90B880; color: #1A4808; }
body[data-theme="hobbits"] #sb-toggle:hover { background: #D6E8C4; }
body[data-theme="hobbits"] .lang-btn.active { background: #1A4808; border-color: #2D5A1E; color: #E0F0D8; }
body[data-theme="hobbits"] .lang-btn:hover  { background: #0A2808; border-color: #2D5A1E; color: #C8E8B8; }
body[data-theme="hobbits"] #orphan-btn { background: #0A3810; border-color: #2D5A1E; }
body[data-theme="hobbits"] #music-player { background: linear-gradient(to right, #060E06ee, #101E10ee); border-top-color: #1A4808; }
body[data-theme="hobbits"] #music-toggle { border-color: #2D5A1E; color: #90D080; }
body[data-theme="hobbits"] #music-toggle:hover { background: #0A1E0A; }
body[data-theme="hobbits"] #music-vol-icon { color: #2D5A1E; }
body[data-theme="hobbits"] #back-btn { color: #2D5A1E; border-color: #90B880; background: rgba(242,247,238,0.88); }
body[data-theme="hobbits"] #back-btn:hover { background: rgba(224,238,216,0.96); color: #1A3A10; }

/* ─── SEARCH ───────────────────────────────────────────────────────────────── */
#search-btn {
  background: transparent; border: 1px solid #4A3020; color: #A08858;
  padding: 4px 10px; cursor: pointer; font-size: 15px; border-radius: 2px;
  transition: all 0.18s; font-family: inherit; line-height: 1;
}
#search-btn:hover { background: #3A2010; border-color: #8B6914; color: #F0DEB0; }
#search-overlay {
  display: none; position: fixed; inset: 0; z-index: 400;
  background: rgba(15,8,3,0.62);
  align-items: flex-start; justify-content: center;
  padding-top: 100px;
}
#search-overlay.open { display: flex; }
#search-box {
  background: #FAF5EC;
  border: 1px solid #C0A060;
  border-radius: 8px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.35);
  width: min(520px, 92vw);
  overflow: hidden;
}
#search-input {
  width: 100%; padding: 16px 20px;
  border: none; outline: none;
  font-size: 16px; font-weight: 300;
  font-family: 'Source Sans 3', sans-serif;
  background: transparent; color: #1E1008;
  border-bottom: 1px solid #DDD0A8;
}
#search-input::placeholder { color: #B0A080; font-style: italic; }
#search-results { max-height: 360px; overflow-y: auto; }
.search-result {
  padding: 11px 20px; cursor: pointer;
  display: flex; align-items: baseline; gap: 10px;
  border-bottom: 0.5px solid #EAE0C0;
  transition: background 0.12s;
}
.search-result:last-child { border-bottom: none; }
.search-result:hover { background: #F0E4C4; }
.sr-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 15px; font-weight: 400; color: #1E1008;
}
.sr-name em { font-style: normal; color: #9A6808; font-weight: 600; }
.sr-detail {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 11px; font-weight: 300; color: #8A7050;
}
#search-empty {
  padding: 20px 20px; text-align: center;
  font-size: 13px; color: #A89878; font-style: italic;
  font-family: 'Source Sans 3', sans-serif;
}

.sb-edit-btn { background:none;border:none;cursor:pointer;color:#b8996a;font-size:14px;padding:0 0 0 8px;opacity:0.7;transition:opacity 0.15s;vertical-align:middle; }
.sb-edit-btn:hover { opacity:1;color:#8b6914; }
.sb-add-section { width:100%;margin-top:18px;padding-top:14px;border-top:1px solid #d8c090; }
.sb-add-row { display:flex;gap:7px;flex-wrap:wrap;width:100%;margin-top:8px; }
.sb-add-btn { flex:1;min-width:80px;background:#EFE3C8;border:1px solid #c8aa70;color:#7a5810;font-size:11px;padding:6px 8px;border-radius:6px;cursor:pointer;font-family:inherit;transition:background 0.15s; }
.sb-add-btn:hover { background:#e0d0a0; }
.sb-form-header { display:flex;align-items:center;gap:8px;width:100%;margin-bottom:16px; }
.sb-form-back { background:none;border:none;cursor:pointer;color:#8b6914;font-size:20px;padding:0;line-height:1;transition:color 0.15s; }
.sb-form-back:hover { color:#5a3e10; }
.sb-form-title { font-family:Georgia,serif;font-size:13px;color:#4a3020;flex:1; }
.sb-form-section { width:100%;margin-bottom:15px; }
.sb-form-section-title { font-size:9px;letter-spacing:2px;color:#b8996a;text-transform:uppercase;margin-bottom:8px;padding-bottom:4px;border-bottom:1px solid #d8c090; }
.sb-context-label { font-size:11px;color:#8a7060;margin-bottom:14px;font-style:italic;background:#f5ead5;padding:6px 10px;border-radius:5px;border:1px solid #d8c090; }
.sb-field { margin-bottom:9px; }
.sb-label { display:block;font-size:10px;color:#8a7060;margin-bottom:3px;letter-spacing:0.3px; }
.sb-input { width:100%;padding:6px 8px;border:1px solid #c8b090;border-radius:5px;font-size:12px;font-family:inherit;background:#FAF5EC;color:#2c1810;outline:none;transition:border-color 0.15s; }
.sb-input:focus { border-color:#a07810; }
.sb-textarea { width:100%;padding:8px;border:1px solid #c8b090;border-radius:5px;font-size:12px;font-family:inherit;background:#FAF5EC;color:#2c1810;resize:vertical;min-height:90px;outline:none;line-height:1.6; }

.sb-gender-row { display:flex;gap:16px; }
.sb-radio-label { display:flex;align-items:center;gap:5px;font-size:12px;color:#4a3020;cursor:pointer; }
.sb-nat-row { display:flex;flex-wrap:wrap;gap:5px; }
.sb-nat-btn { padding:4px 7px;border-radius:4px;cursor:pointer;font-size:14px;border:2px solid transparent;background:#EFE3C8;transition:all 0.12s; }
.sb-nat-btn.active { border-color:#c8960a;background:#fff8e0; }
.sb-nat-btn:hover { background:#e0d8b0; }
.sb-bio-tabs { display:flex;gap:4px;margin-bottom:0; }
.sb-bio-tab { padding:3px 10px;border-radius:4px 4px 0 0;font-size:10px;font-weight:600;cursor:pointer;border:1px solid #c8b090;border-bottom:none;background:#ede0c0;color:#8a7060;font-family:inherit; }
.sb-bio-tab.active { background:#FAF5EC;color:#4a3020; }
.sb-form-actions { display:flex;gap:8px;width:100%;margin-top:18px;padding-top:14px;border-top:1px solid #d8c090; }
.sb-btn-save { flex:2;padding:9px;background:#8b6914;border:none;border-radius:6px;color:white;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit;transition:background 0.15s; }
.sb-btn-save:hover { background:#6a5010; }
.sb-btn-cancel { flex:1;padding:9px;background:#EFE3C8;border:1px solid #c8b090;border-radius:6px;color:#5a4030;font-size:12px;cursor:pointer;font-family:inherit;transition:background 0.15s; }
.sb-btn-cancel:hover { background:#e0d0a0; }
.sb-storage-note { font-size:10px;color:#8a7060;font-style:italic;text-align:center;margin-top:10px;width:100%; }
.export-btn { background:transparent;border:1px solid #4A3020;color:#A08858;padding:4px 10px;cursor:pointer;font-size:10px;font-weight:600;letter-spacing:1.5px;border-radius:2px;transition:all 0.18s;font-family:'Source Sans 3',sans-serif; }
.export-btn:hover { background:#3A2010;border-color:#8B6914;color:#F0DEB0; }
.sb-error { color:#b03020;font-size:11px;margin-top:6px;padding:6px 8px;background:#fdf0ee;border-radius:4px;border:1px solid #e0a090; }
#lightbox {
  display: none;
  position: fixed; inset: 0; z-index: 500;
  align-items: center; justify-content: center;
}
#lb-overlay {
  position: absolute; inset: 0;
  background: rgba(20,10,5,0.78);
  cursor: pointer;
}
#lb-content {
  position: relative; z-index: 1;
  max-width: 88vw; max-height: 88vh;
  display: flex; flex-direction: column;
  align-items: center; gap: 14px;
}
#lb-close {
  position: absolute; top: -38px; right: 0;

  transition: color 0.15s;
}
#lb-close:hover { color: white; }
#lb-img {
  max-width: 100%; max-height: 76vh;
  border-radius: 8px; object-fit: contain;

}
#lb-caption {
  color: rgba(255,255,255,0.82);

  font-style: italic; font-size: 14px;

/* ─── SUCCESSION TIMELINE ─────────────────────────────────────────────────── */
#succession-timeline {
  display: none;
  position: fixed;
  left: 0; top: 62px;
  width: 152px;
  height: calc(100vh - 62px);
  background: linear-gradient(170deg, #180A03 0%, #221005 60%, #180A03 100%);
  border-right: 1px solid #3E2408;
  z-index: 150;
  -webkit-mask-image: linear-gradient(to bottom, transparent 0%, black 9%, black 91%, transparent 100%);
  mask-image: linear-gradient(to bottom, transparent 0%, black 9%, black 91%, transparent 100%);
}
#succession-timeline.active { display: block; }
#succ-tl-inner {
  overflow-y: auto;
  height: 100%;
  padding: 52px 0;
  scrollbar-width: none;
}
#succ-tl-inner::-webkit-scrollbar { display: none; }
.tl-item {
  min-height: 52px;
  padding: 6px 12px 6px 12px;
  cursor: pointer;
  border-left: 2px solid transparent;
  transition: opacity 0.38s, background 0.15s;
  user-select: none;
  display: flex;
  flex-direction: column;
  justify-content: center;
}
.tl-item.tl-pad { cursor: default; pointer-events: none; }
.tl-item:not(.tl-pad):not(.tl-current):hover { background: rgba(255,255,255,0.05); }
.tl-current {
  border-left-color: #C8960A !important;
  background: rgba(200,150,10,0.10) !important;
}
.tl-name {
  font-family: 'Playfair Display', Georgia, serif;
  font-size: 11px; font-weight: 600;
  color: #EAD9B0; line-height: 1.25;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tl-current .tl-name { font-size: 13px; color: #FFE870; }
.tl-epithet {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 9px; color: #B89860; margin-top: 1px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.tl-current .tl-epithet { color: #D4A840; }
.tl-years {
  font-family: 'Source Sans 3', sans-serif;
  font-size: 8.5px; color: #907858; margin-top: 2px; letter-spacing: 0.2px;
}
.tl-current .tl-years { color: #B89040; }
.tl-map {
  display: block; width: 100%; margin-top: 5px;
  border-radius: 3px; opacity: 0.55;
  object-fit: cover; height: 72px;
  filter: sepia(30%) contrast(0.9);
  transition: opacity 0.2s;
}
.tl-current .tl-map { opacity: 0.9; filter: sepia(10%) contrast(1); }
body.has-timeline #tree-container { margin-left: 152px; width: calc(100% - 152px); }
body.has-timeline #orphan-btn { left: 172px; }

<script>
(function(){
  // 1. URL hash — origin-independent, works across all file:// origins
  var hash = location.hash;
  if (hash && hash.indexOf('#td=') === 0) {
    try { window.ELIADORA_DATA = JSON.parse(decodeURIComponent(hash.slice(4))); } catch(e){}
    if (window.ELIADORA_DATA) return;
  }
  // 2. ?data= param fallbacks
  var p = new URLSearchParams(location.search).get('data') || 'eliadora-data';
  if (p === '_form') {
    var d = sessionStorage.getItem('eliadora_form_data');
    if (d) { try { window.ELIADORA_DATA = JSON.parse(d); } catch(e){} }
    if (!window.ELIADORA_DATA) {
      var d2 = localStorage.getItem('eliadora_form_data');
      if (d2) { try { window.ELIADORA_DATA = JSON.parse(d2); } catch(e){} }
    }
  } else if (p.indexOf('_ls:') === 0) {
    var d = localStorage.getItem('arbor-tree-data-' + p.slice(4));
    if (d) { try { window.ELIADORA_DATA = JSON.parse(d); } catch(e){} }
  } else {
    document.write('<script src="' + p + '.js"><\/script>');
  }
})();
</script>

let lang = 'pl';
const t = k => (I18N[lang] || I18N.pl)[k] || k;

// Family name from data file
const FAMILY_NAME = () => _DATA.familyName || '';

// ─── DATE FORMATTER ───────────────────────────────────────────────────────────
// Accepts: '1982', '1982-03', '1982-03-15', or legacy numbers like 1982
const MONTHS = {
  pl: ['stycznia','lutego','marca','kwietnia','maja','czerwca','lipca','sierpnia','września','października','listopada','grudnia'],
  en: ['January','February','March','April','May','June','July','August','September','October','November','December'],
  es: ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'],
  fr: ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'],
};
function formatDate(val) {
  if (!val && val !== 0) return '';
  const s = String(val).trim();
  if (/^\d{4}$/.test(s)) return s;
  const parts = s.split('-');
  if (parts.length === 2) {
    const m = parseInt(parts[1], 10) - 1;
    const mName = (MONTHS[lang] || MONTHS.pl)[m] || parts[1];
    return `${mName} ${parts[0]}`;
  }
  if (parts.length === 3) {
    const day = parseInt(parts[2], 10);
    const m   = parseInt(parts[1], 10) - 1;
    const yr  = parts[0];
    const mName = (MONTHS[lang] || MONTHS.pl)[m] || parts[1];
    if (lang === 'pl') return `${day} ${mName} ${yr}`;
    if (lang === 'en') return `${mName} ${day}, ${yr}`;
    if (lang === 'es') return `${day} de ${mName} de ${yr}`;
    if (lang === 'fr') return `${day} ${mName} ${yr}`;
    return `${day} ${mName} ${yr}`;
  }
  return s;
}
// Extract birth year as a number for age calculations
function birthYear(val) {
  if (!val && val !== 0) return null;
  const n = parseInt(String(val).replace(/^[^0-9]+/, '').split('-')[0], 10);
  return isNaN(n) ? null : n;
}

// ─── FLAG HELPER ──────────────────────────────────────────────────────────────
const FLAG_MAP = {
  PL:'🇵🇱', CO:'🇨🇴', NL:'🇳🇱', GB:'🇬🇧', UK:'🇬🇧', US:'🇺🇸',
  DE:'🇩🇪', FR:'🇫🇷', IT:'🇮🇹', ES:'🇪🇸', UA:'🇺🇦', AR:'🇦🇷',
  CZ:'🇨🇿', HU:'🇭🇺', LT:'🇱🇹', AT:'🇦🇹', SE:'🇸🇪', RU:'🇷🇺',
  RUS:'🔱',
};
const SHOWN_NATS = new Set(['PL','NL','CO','US','GB','UK']);
function getFlags(nat) {
  if (!nat) return '';
  const codes = Array.isArray(nat) ? nat : [nat];
  const shown = codes.filter(c => SHOWN_NATS.has(c));
  const others = codes.filter(c => !SHOWN_NATS.has(c) && c);
  const parts = shown.map(c => FLAG_MAP[c] || '');
  if (others.length) parts.push('🌐');
  return parts.join('');
}

// ── Media helpers ────────────────────────────────────────────────────────────
function isVideo(src) {
  if (!src) return false;
  const ext = src.split('.').pop().toLowerCase();
  return ext === 'mp4' || ext === 'webm' || ext === 'ogg';
}
// Unified media source: person.media > person.gif > person.image > fallback
// Supports the new single-field schema while staying backward compatible.
function getMediaSrc(person, fallback) {
  return person.media || person.gif || person.image || fallback;
}
function isVideoMedia(person) {
  const src = person.media || person.gif;
  return !!(src && isVideo(src));
}

// ── Active video elements tracker ────────────────────────────────────────────
// We keep track of video DOM elements so we can pause them when focus changes.
const _activeVideos = new Set();
function stopAllVideos() {
  _activeVideos.forEach(v => { try { v.pause(); v.currentTime=0; } catch(e){} });
  _activeVideos.clear();
}

// ── Sync queue: play focal videos together ────────────────────────────────────
// Card video is created before the sidebar video (different render phases).
// Both are queued here and started in the same tick after both exist,
// so they play in perfect sync.
const _pendingFocalVideos = [];
function queueFocalVideo(vid) {
  _pendingFocalVideos.push(vid);
  _activeVideos.add(vid);
}
function startFocalVideos() {
  const vids = _pendingFocalVideos.splice(0);
  if (!vids.length) return;
  vids.forEach(v => v.play().catch(()=>{}));
}

// ── Video first-frame display ─────────────────────────────────────────────────
// Canvas toDataURL() is blocked on file:// for security reasons.
// Instead, we use a <video> element with no autoplay and currentTime=0 —
// the browser natively shows the first frame without playing.
// No canvas, no CORS issues, works everywhere.

// ─── DATA (loaded from eliadora-data.js) ──────────────────────────────────────
// If the external file fails to load (e.g. opened via file:// without a server),
// the app shows an empty tree rather than crashing.
// ─── COLOUR THEME (driven by ?data= URL param) ────────────────────────────────
const _PARAM = new URLSearchParams(location.search).get('data') || 'kings-poland';
const _THEMES = {
  'eliadora-data': {
    cardFocal:   '#FBF5E2', cardNormal: '#F6F0E0',
    frameFocal:  '#C89018', frameNormal: '#BBA880',
    glowInner:   '#D4A020', glowOuter:  '#E8C040',
    connector:   '#8A6C18',
    cardStroke:  '#C89018',
  },
  'hobbits': {
    cardFocal:   '#F2F8EC', cardNormal: '#ECF4E6',
    frameFocal:  '#2D5A1E', frameNormal: '#7A9868',
    glowInner:   '#3A8028', glowOuter:  '#60B040',
    connector:   '#2A5818',
    cardStroke:  '#2D5A1E',
  },
};
const THEME = _THEMES[_PARAM] || _THEMES['eliadora-data'];
document.body.dataset.theme = _PARAM;

const _DATA    = window.ELIADORA_DATA || { familyName: '', defaultFocus: '', people: [] };
const FOCUS_ID = _DATA.defaultFocus || (_DATA.people?.[0]?.id) || '';

// PEOPLE is the live mutable runtime array.
// Merge strategy: JS file is always the base (so new people added to the file appear).
// localStorage overrides existing entries (preserving your browser edits) and
// contributes any user-created entries not present in the JS file.
let PEOPLE = (() => {
  try {
    const fingerprint = _DATA.familyName || 'eliadora';
    const saved = localStorage.getItem('eliadora_people');
    const savedFingerprint = localStorage.getItem('eliadora_fingerprint');
    localStorage.setItem('eliadora_fingerprint', fingerprint);
    if (saved && savedFingerprint === fingerprint) {
      const parsed = JSON.parse(saved);
      if (parsed.length) {
        const savedById = Object.fromEntries(parsed.map(p => [p.id, p]));
        const jsIds     = new Set((_DATA.people || []).map(p => p.id));
        // JS base first (guarantees new JS people appear), overridden by saved edits
        const merged = (_DATA.people || []).map(p => savedById[p.id] ? {...savedById[p.id]} : {...p});
        // Append user-created people that don't exist in the JS file
        parsed.forEach(p => { if (!jsIds.has(p.id)) merged.push({...p}); });
        return merged;
      }
    }
    localStorage.removeItem('eliadora_people');
  } catch(e) { try { localStorage.removeItem('eliadora_people'); } catch(e2) {} }
  return (_DATA.people || []).map(p => ({...p}));
})();

let PMAP = Object.fromEntries(PEOPLE.map(p => [p.id, p]));
function rebuildPMAP() { PMAP = Object.fromEntries(PEOPLE.map(p => [p.id, p])); }

// ── Stale ID cleanup ──────────────────────────────────────────────────────────
// Runs once on load. Removes any IDs in p[] or s[] that don't exist in PMAP.
// Silently fixes corrupted data from previous sessions without user intervention.
(function cleanStaleIds() {
  let changed = false;
  PEOPLE.forEach(person => {
    const cleanP = (person.p || []).filter(id => id && PMAP[id]);
    const cleanS = (person.s || []).filter(id => id && PMAP[id]);
    if (cleanP.length !== (person.p||[]).length) { person.p = cleanP; changed = true; }
    if (cleanS.length !== (person.s||[]).length) { person.s = cleanS; changed = true; }
  });
  if (changed) {
    rebuildPMAP();
    try { localStorage.setItem('eliadora_people', JSON.stringify(PEOPLE)); } catch(e) {}
  }
})();

// ─── LAYOUT CONSTANTS ─────────────────────────────────────────────────────────
const L = {
  CW:  110,   // card width
  CH:  132,   // card height
  CG:   16,   // couple gap
  BU:   40,   // between units
  RH:  188,   // row height
  PX:   60, PY: 52,
  PR_N:  30,  // oval half-width normal
  PRH_N: 36,  // oval half-height normal
  PC_N:  40,  // oval centre-y normal
  PR_F:  36,  // oval half-width focal
  PRH_F: 43,  // oval half-height focal
  PC_F:  47,  // oval centre-y focal
};
L.UW = L.CW * 2 + L.CG;
L.CO = (L.CW + L.CG) / 2;
L.ML_Y = L.PC_N;

// ─── RNG + AGE ────────────────────────────────────────────────────────────────
function seededRand(id) {
  let h = 0;
  for (let i = 0; i < id.length; i++) h = (Math.imul(31, h) + id.charCodeAt(i)) | 0;
  return () => { h = (Math.imul(1664525, h) + 1013904223) | 0; return (h >>> 0) / 0xFFFFFFFF; };
}
function ageGroup(p) {
  const by  = birthYear(p.b);
  if (!by) return 'senior';
  const ref = birthYear(p.d) || new Date().getFullYear();
  const age = ref - by;
  return age < 18 ? 'child' : age < 55 ? 'adult' : 'elder';
}
function ageFallback(person) {
  const grp = ageGroup(person);
  const sex = person.g === 'F' ? 'f' : 'm';
  const fileGrp = grp === 'senior' ? 'elder' : grp;
  return `../Sat-Izq/Eliadora Sat-Izq/${fileGrp}_${sex}.png`;
}

// ─── FACE GENERATOR ───────────────────────────────────────────────────────────
function buildFaceSVG(person, r) {
  const rand=seededRand(person.id), grp=ageGroup(person);
  const isF=person.g==='F', isChild=grp==='young', isElder=grp==='senior';
  const cx=r, cy=r;
  const skinPal=isF?['#FDDCB5','#FDC8A0','#F5B480']:['#FDDCB5','#FDC8A0','#F5B480','#E8A068','#D48850'];
  const skin=skinPal[Math.floor(rand()*skinPal.length)];
  const hairPal=isElder?['#C0C0B8','#D0C8B0','#B8B8B0','#E0DDD8']:isChild?['#7B3A00','#C07028','#D4A020','#3A1800','#1A0800']:['#5C2800','#8B4513','#C07828','#1C0800','#2A2020','#7A6040'];
  const hair=hairPal[Math.floor(rand()*hairPal.length)];
  const OL='#5C2800', SW=Math.max(1.0,r*0.055);
  const hR=r*0.68, hCx=cx, hCy=cy+r*0.09;
  const bg=isChild&&isF?'#FFF0F5':isChild?'#F0F5FF':isF?'#FEF0F8':'#F0F5FF';
  const p=[];
  p.push(`<circle cx="${cx}" cy="${cy}" r="${r}" fill="${bg}"/>`);
  if(isF&&!isElder) p.push(`<ellipse cx="${hCx}" cy="${hCy+hR*0.10}" rx="${hR*1.24}" ry="${hR*1.26}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.80}"/>`);
  p.push(`<circle cx="${hCx}" cy="${hCy}" r="${hR}" fill="${skin}" stroke="${OL}" stroke-width="${SW}"/>`);
  const earR=hR*0.148,earY=hCy+hR*0.02;
  [hCx-hR*0.91,hCx+hR*0.91].forEach(ex=>{p.push(`<circle cx="${ex}" cy="${earY}" r="${earR}" fill="${skin}" stroke="${OL}" stroke-width="${SW*0.65}"/>`);});
  if(isElder){
    if(!isF) p.push(`<ellipse cx="${hCx}" cy="${hCy-hR*0.82}" rx="${hR*0.46}" ry="${hR*0.18}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.55}" opacity="0.88"/>`);
    else{const capCy=hCy-hR*0.64;p.push(`<ellipse cx="${hCx}" cy="${capCy}" rx="${hR*1.04}" ry="${hR*0.40}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.75}"/>`);for(let i=-1;i<=1;i++)p.push(`<circle cx="${hCx+i*hR*0.42}" cy="${capCy-hR*0.22}" r="${hR*0.19}" fill="${hair}"/>`);}
  } else if(isF){
    const capCy=hCy-hR*0.72;p.push(`<ellipse cx="${hCx}" cy="${capCy}" rx="${hR*1.10}" ry="${hR*0.37}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.80}"/>`);
    if(isChild)[hCx-hR*1.06,hCx+hR*1.06].forEach(bx=>p.push(`<circle cx="${bx}" cy="${hCy-hR*0.20}" r="${hR*0.23}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.65}"/>`));
  } else {
    const capCy=hCy-hR*0.76;p.push(`<ellipse cx="${hCx}" cy="${capCy}" rx="${hR*0.98}" ry="${hR*0.32}" fill="${hair}" stroke="${OL}" stroke-width="${SW*0.80}"/>`);
    if(isChild)for(let i=-1;i<=1;i++){const sx=hCx+i*hR*0.32,tCy=hCy-hR*0.92;p.push(`<ellipse cx="${sx}" cy="${tCy}" rx="${hR*0.088}" ry="${hR*0.18}" fill="${hair}" transform="rotate(${i*14} ${sx} ${tCy+hR*0.10})"/>`);}
  }
  const eyeY=hCy-hR*0.14,eyeOff=hR*0.30,eyeRx=hR*0.158,eyeRy=hR*0.122;
  [-eyeOff,eyeOff].forEach(ox=>{const ex=hCx+ox;
    p.push(`<ellipse cx="${ex}" cy="${eyeY}" rx="${eyeRx}" ry="${eyeRy}" fill="white" stroke="${OL}" stroke-width="${SW*0.52}"/>`);
    p.push(`<circle cx="${ex}" cy="${eyeY}" r="${hR*0.092}" fill="#3A1A00"/>`);
    p.push(`<circle cx="${ex+hR*0.040}" cy="${eyeY-hR*0.040}" r="${hR*0.026}" fill="white"/>`);
  });
  const browY=eyeY-hR*0.225,browCol=isElder?'#909088':OL;
  [-eyeOff,eyeOff].forEach(ox=>{const bx=hCx+ox,tilt=ox<0?0.042:-0.042;
    p.push(`<path d="M${bx-hR*0.135},${browY+hR*tilt} Q${bx},${browY-hR*0.052} ${bx+hR*0.135},${browY+hR*tilt}" fill="none" stroke="${browCol}" stroke-width="${SW*0.88}" stroke-linecap="round"/>`);
  });
  const noseY=hCy+hR*0.10;
  [-hR*0.08,hR*0.08].forEach(nx=>{const sign=nx<0?1:-1;
    p.push(`<path d="M${hCx+nx},${noseY} Q${hCx+nx*0.5},${noseY+hR*0.075} ${hCx+nx*sign*0.02},${noseY+hR*0.065}" fill="none" stroke="#C08060" stroke-width="${SW*0.58}" stroke-linecap="round" opacity="0.60"/>`);
  });
  const cheekY=eyeY+hR*0.28;
  [-eyeOff*1.18,eyeOff*1.18].forEach(ox=>p.push(`<ellipse cx="${hCx+ox}" cy="${cheekY}" rx="${hR*0.19}" ry="${hR*0.115}" fill="#FF5050" opacity="0.16"/>`));
  const mouthY=hCy+hR*0.35,mouthW=hR*(isChild?0.268:0.208),mouthD=hR*0.115;
  p.push(`<path d="M${hCx-mouthW},${mouthY} Q${hCx},${mouthY+mouthD} ${hCx+mouthW},${mouthY}" fill="none" stroke="#B84838" stroke-width="${SW*0.90}" stroke-linecap="round"/>`);
  if(isElder){const wc='#C09070';
    p.push(`<path d="M${hCx-hR*0.12},${noseY+hR*0.06} Q${hCx-hR*0.20},${mouthY-hR*0.06} ${hCx-mouthW*0.85},${mouthY}" fill="none" stroke="${wc}" stroke-width="${SW*0.46}" stroke-linecap="round" opacity="0.48"/>`);
    p.push(`<path d="M${hCx+hR*0.12},${noseY+hR*0.06} Q${hCx+hR*0.20},${mouthY-hR*0.06} ${hCx+mouthW*0.85},${mouthY}" fill="none" stroke="${wc}" stroke-width="${SW*0.46}" stroke-linecap="round" opacity="0.48"/>`);
    p.push(`<path d="M${hCx-hR*0.28},${hCy-hR*0.44} Q${hCx},${hCy-hR*0.47} ${hCx+hR*0.28},${hCy-hR*0.44}" fill="none" stroke="${wc}" stroke-width="${SW*0.36}" opacity="0.38"/>`);
  }
  return p.join('');
}

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function unitW(u) { return (u.male&&u.female)?L.UW:L.CW; }
function cardCx(unit, personId) {
  if (!unit.male||!unit.female) return unit.cx;
  const p=PMAP[personId];
  return p?unit.cx+(p.g==='M'?-L.CO:L.CO):unit.cx;
}

// ─── HOURGLASS BUILDER ────────────────────────────────────────────────────────
function buildHourglass(focusId) {
  function curSpouse(id){const p=PMAP[id];if(!p||!p.s.length)return null;return PMAP[p.s[p.s.length-1]]||null;}
  function mkUnit(id,vis){const p=PMAP[id];if(!p)return null;const sp=curSpouse(id);const male=p.g==='M'?p:(sp&&sp.g==='M'?sp:null);const female=p.g==='F'?p:(sp&&sp.g==='F'?sp:null);return{male,female,mainId:id,vis};}
  function getParents(id){
    const p=PMAP[id]; if(!p||!p.p.length) return null;
    if(p.p.length===1){ const par=PMAP[p.p[0]]; if(!par) return null; return par.g==='F'?{dad:null,mom:par}:{dad:par,mom:null}; }
    const dad=PMAP[p.p[0]]||null, mom=PMAP[p.p[1]]||null;
    return (dad||mom)?{dad,mom}:null;
  }
  const parents=getParents(focusId);
  const row0=[mkUnit(focusId,'full')].filter(Boolean);
  const row1=PEOPLE.filter(p=>p.p.includes(focusId))
    .sort((a,b)=>(birthYear(a.b)||0)-(birthYear(b.b)||0))
    .map(c=>mkUnit(c.id,'full')).filter(Boolean);
  // Row +2: grandchildren, grouped by parent (preserves layout order), sorted within each group.
  const row2=[]; const gcSeen=new Set();
  row1.forEach(u=>{
    const groupKids=[];
    PEOPLE.forEach(gc=>{
      if(gcSeen.has(gc.id)||!gc.p.includes(u.mainId))return;
      gcSeen.add(gc.id);
      const p=PMAP[gc.id]; if(!p) return;
      groupKids.push({male:p.g==='M'?p:null, female:p.g==='F'?p:null, mainId:gc.id, vis:'faded', parentMainId:u.mainId});
    });
    // Sort within this parent's group only — never across groups
    groupKids.sort((a,b)=>(birthYear(PMAP[a.mainId]?.b)||0)-(birthYear(PMAP[b.mainId]?.b)||0));
    row2.push(...groupKids);
  });
  let rowM1=[];
  if(parents){const dad=parents.dad,mom=parents.mom;const male=dad?.g==='M'?dad:(mom?.g==='M'?mom:null);const female=mom?.g==='F'?mom:(dad?.g==='F'?dad:null);rowM1=[{male,female,mainId:dad?.id||mom?.id,vis:'full'}].filter(u=>u&&u.mainId);}
  const rowM2=[];
  if(parents){
    if(parents.dad){const dp=getParents(parents.dad.id);if(dp){const u=mkUnit(dp.dad?.id||dp.mom?.id,'full');if(u)rowM2.push({...u,childId:parents.dad.id});}}
    if(parents.mom){const mp=getParents(parents.mom.id);if(mp){const u=mkUnit(mp.dad?.id||mp.mom?.id,'full');if(u)rowM2.push({...u,childId:parents.mom.id});}}
  }
  const siblings=[],seen=new Set([focusId]);
  if(parents){
    const dadId=parents.dad?.id, momId=parents.mom?.id;
    PEOPLE.forEach(p=>{
      if(seen.has(p.id))return;
      const sharesDad=!!(dadId&&p.p.includes(dadId));
      const sharesMom=!!(momId&&p.p.includes(momId));
      if(!sharesDad&&!sharesMom)return;
      const spId=p.s[p.s.length-1];
      seen.add(p.id);if(spId)seen.add(spId);
      const isHalf=!(sharesDad&&sharesMom);
      const u=mkUnit(p.id,'faded'); if(!u) return;
      siblings.push({...u,isHalf});
    });
  }
  siblings.sort((a,b)=>(birthYear(PMAP[a.mainId]?.b)||0)-(birthYear(PMAP[b.mainId]?.b)||0));
  const formerSpouses=[];
  const fp=PMAP[focusId];
  if(fp&&fp.s.length>1){
    for(let i=0;i<fp.s.length-1;i++){
      const fs=PMAP[fp.s[i]]; if(!fs) continue;
      formerSpouses.push({male:fs.g==='M'?fs:null, female:fs.g==='F'?fs:null, mainId:fs.id, vis:'full', isFormer:true});
    }
  }
  const SUCC_CHAIN=(_DATA.succession||[]);
  const si=SUCC_CHAIN.indexOf(focusId);
  const mkSU=id=>id&&PMAP[id]?{male:PMAP[id].g==='M'?PMAP[id]:null,female:PMAP[id].g==='F'?PMAP[id]:null,mainId:id,vis:'succ'}:null;
  const succPrev=si>0?mkSU(SUCC_CHAIN[si-1]):null;
  const succNext=si>=0&&si<SUCC_CHAIN.length-1?mkSU(SUCC_CHAIN[si+1]):null;
  return{row0,rowM1,rowM2,row1,row2,siblings,formerSpouses,succPrev:null,succNext:null};
}

// ─── LAYOUT ───────────────────────────────────────────────────────────────────
function calculateLayout(hg) {
  function rw(us){return us.length?us.reduce((s,u)=>s+unitW(u),0)+(us.length-1)*L.BU:0;}
  function ax(us,cx){let x=cx-rw(us)/2;return us.map(u=>{const uw=unitW(u),ucx=x+uw/2;x+=uw+L.BU;return{...u,cx:ucx};});}
  const r2=ax(hg.rowM2,0),r1=ax(hg.rowM1,0),r0=ax(hg.row0,0),r1p=ax(hg.row1,0);
  // Collapse empty top rows so the tree doesn't start with blank space
  const topShift=(r2.length?0:L.RH)+(r1.length?0:L.RH);
  const Y={M2:L.PY,M1:L.PY+L.RH,R0:L.PY+L.RH*2,R1:L.PY+L.RH*3,R2:L.PY+L.RH*4};
  Object.keys(Y).forEach(k=>Y[k]-=topShift);
  // Row+2: simple global centering, but parent-grouped order (fixed in buildHourglass).
  // Grouping prevents crossing lines between different families.
  // Simple centering keeps the row compact and avoids excessive spread.
  const r2p=ax(hg.row2,0);

  const fHW=r0.length?unitW(r0[0])/2:0;
  const fS=hg.siblings.filter(s=>!s.isHalf),hS=hg.siblings.filter(s=>s.isHalf);
  let rx=fHW+L.BU;const rS=fS.map(s=>{const uw=unitW(s),cx=rx+uw/2;rx+=uw+L.BU;return{...s,cx};});
  let lx=-(fHW+L.BU);const lS=hS.map(s=>{const uw=unitW(s),cx=lx-uw/2;lx-=uw+L.BU;return{...s,cx};});
  // Former spouses: placed left of focal couple, oldest furthest left.
  const fmr=[];
  if(hg.formerSpouses&&hg.formerSpouses.length){
    const focalLE=r0.length?r0[0].cx-unitW(r0[0])/2:0;
    let nextRE=focalLE-L.BU;
    for(let i=hg.formerSpouses.length-1;i>=0;i--){
      const fs=hg.formerSpouses[i], uw=unitW(fs), cx=nextRE-uw/2;
      nextRE=cx-uw/2-L.BU;
      fmr[i]={...fs,cx};
    }
  }
  const mainAll=[...r2,...r1,...r0,...r1p,...r2p,...rS,...lS,...fmr];
  if(!mainAll.length)return{rowM2:[],rowM1:[],row0:[],row1:[],row2:[],siblings:[],formerSpouseUnits:[],succPrev:null,succNext:null,svgW:800,svgH:600,focalCx:400,focalRowY:L.PY};
  const mle=Math.min(...mainAll.map(u=>u.cx-unitW(u)/2));
  const mre=Math.max(...mainAll.map(u=>u.cx+unitW(u)/2));
  const spvRaw=hg.succPrev?{...hg.succPrev,cx:mle-L.BU*2-L.CW/2}:null;
  const sntRaw=hg.succNext?{...hg.succNext,cx:mre+L.BU*2+L.CW/2}:null;
  const all=[...mainAll,...(spvRaw?[spvRaw]:[]),...(sntRaw?[sntRaw]:[])];
  const le=Math.min(...all.map(u=>u.cx-(u.vis==='succ'?L.CW/2:unitW(u)/2)));
  const re=Math.max(...all.map(u=>u.cx+(u.vis==='succ'?L.CW/2:unitW(u)/2)));
  const sh=u=>({...u,cx:u.cx+(L.PX-le)});
  let maxY=Y.R0+L.CH;
  if(r1p.length)maxY=Math.max(maxY,Y.R1+L.CH);
  if(r2p.length)maxY=Math.max(maxY,Y.R2+L.CH);
  return{
    rowM2:r2.map(u=>({...sh(u),y:Y.M2})),rowM1:r1.map(u=>({...sh(u),y:Y.M1})),
    row0:r0.map(u=>({...sh(u),y:Y.R0})),row1:r1p.map(u=>({...sh(u),y:Y.R1})),
    row2:r2p.map(u=>({...sh(u),y:Y.R2})),siblings:[...rS,...lS].map(u=>({...sh(u),y:Y.R0})),
    formerSpouseUnits:fmr.map(u=>({...sh(u),y:Y.R0})),
    svgW:Math.ceil(re-le+L.PX*2),svgH:maxY+L.PY,
    focalCx:(r0.length?r0[0].cx:0)+(L.PX-le),
    focalRowY:Y.R0,
    succPrev:spvRaw?{...sh(spvRaw),y:Y.R0}:null,
    succNext:sntRaw?{...sh(sntRaw),y:Y.R0}:null,
  };
}

// ─── FLAT DATA BUILDERS ───────────────────────────────────────────────────────
function buildCardData(pos,focusId){
  const cards=[];
  function addUnit(unit,isFormer){
    const lx=unit.cx-unitW(unit)/2,op=unit.vis==='faded'?0.42:1;
    if(unit.male&&unit.female){
      cards.push({id:unit.male.id,  x:lx,           y:unit.y,person:unit.male,  isFocal:unit.male.id===focusId,  opacity:op,isFormer:!!isFormer});
      cards.push({id:unit.female.id,x:lx+L.CW+L.CG, y:unit.y,person:unit.female,isFocal:unit.female.id===focusId,opacity:op,isFormer:!!isFormer});
    } else {
      const p=unit.male||unit.female;
      if(p) cards.push({id:p.id,x:lx,y:unit.y,person:p,isFocal:p.id===focusId,opacity:op,isFormer:!!isFormer});
    }
  }
  [...pos.rowM2,...pos.rowM1,...pos.row0,...pos.row1,...pos.row2,...pos.siblings].forEach(u=>addUnit(u,false));
  (pos.formerSpouseUnits||[]).forEach(u=>addUnit(u,true));
  if(pos.succPrev){const p=pos.succPrev.male||pos.succPrev.female;if(p)cards.push({id:p.id,x:pos.succPrev.cx-L.CW/2,y:pos.succPrev.y,person:p,isFocal:false,opacity:0.92,isFormer:false,isSucc:true,succDir:'prev'});}
  if(pos.succNext){const p=pos.succNext.male||pos.succNext.female;if(p)cards.push({id:p.id,x:pos.succNext.cx-L.CW/2,y:pos.succNext.y,person:p,isFocal:false,opacity:0.92,isFormer:false,isSucc:true,succDir:'next'});}
  return cards;
}
function buildMarriageData(pos){
  const lines=[];
  function addUnit(unit){if(!unit.male||!unit.female)return;const lx=unit.cx-unitW(unit)/2;
    lines.push({key:unit.male.id+'~'+unit.female.id,x1:lx+L.CW,y1:unit.y+L.ML_Y,x2:lx+L.CW+L.CG,y2:unit.y+L.ML_Y,op:unit.vis==='faded'?0.35:1});}
  [...pos.rowM2,...pos.rowM1,...pos.row0,...pos.row1,...pos.row2,...pos.siblings].forEach(addUnit);
  return lines;
}

// ─── DRAW CARD ────────────────────────────────────────────────────────────────
function drawCardInto(sel, d) {
  sel.selectAll('*').remove();
  const person = d.person;
  const pr  = d.isFocal ? L.PR_F   : L.PR_N;    // oval half-width
  const prh = d.isFocal ? L.PRH_F  : L.PRH_N;   // oval half-height
  const pc  = d.isFocal ? L.PC_F   : L.PC_N;    // oval centre-y
  const cxC = L.CW / 2;

  // ── Colour palette ────────────────────────────────────────────────────────
  const isSucc    = !!d.isSucc;
  const cardFill  = d.isFocal ? THEME.cardFocal : (isSucc ? '#ECEAF5' : THEME.cardNormal);
  const frameCol  = d.isFocal ? THEME.frameFocal : (isSucc ? '#5A3A90' : THEME.frameNormal);
  const isFormer  = d.isFormer && !d.isFocal;

  // ── Card: aged parchment rectangle with double border ──────────────────────
  // Card body
  sel.append('rect').attr('x',0).attr('y',0)
    .attr('width',L.CW).attr('height',L.CH).attr('rx',6)
    .attr('fill',cardFill)
    .attr('stroke', d.isFocal ? THEME.cardStroke : (isFormer ? '#A09050' : (isSucc ? '#6B4AAC' : THEME.frameNormal)))
    .attr('stroke-width', d.isFocal ? 1.5 : 1);
  // Inner border (double-line effect, the classic genealogical document look)
  sel.append('rect').attr('x',4).attr('y',4)
    .attr('width',L.CW-8).attr('height',L.CH-8).attr('rx',4)
    .attr('fill','none')
    .attr('stroke', d.isFocal ? THEME.glowInner : '#C8B888')
    .attr('stroke-width',0.5)
    .attr('opacity', d.isFocal ? 0.8 : 0.5);
  if(isFormer){sel.select('rect:nth-child(2)').attr('stroke-dasharray','4,3');}
  else if(isSucc){
    sel.select('rect:nth-child(2)').attr('stroke-dasharray','6,4');
    sel.append('text')
      .attr('x',L.CW/2).attr('y',-9)
      .attr('text-anchor','middle').attr('font-size','6.5px')
      .attr('font-family','Source Sans 3, sans-serif').attr('font-weight','600')
      .attr('fill','#5A3A90').attr('letter-spacing','1.5px').attr('opacity',0.8)
      .text(d.succDir==='prev'?'◄ POPRZEDNI':'NASTĘPNY ►');
  }

  if (!_DATA.noPortrait) {
  // ── Focal: gold outer glow ───────────────────────────────────────────────
  if(d.isFocal){
    sel.append('ellipse')
      .attr('cx',cxC).attr('cy',pc)
      .attr('rx',pr+8).attr('ry',prh+8)
      .attr('fill','none').attr('stroke', THEME.glowInner)
      .attr('stroke-width',1.5).attr('opacity',0.50);
    sel.append('ellipse')
      .attr('cx',cxC).attr('cy',pc)
      .attr('rx',pr+14).attr('ry',prh+14)
      .attr('fill','none').attr('stroke', THEME.glowOuter)
      .attr('stroke-width',0.75).attr('opacity',0.22);
  }

  // ── Oval portrait ───────────────────────────────────────────────────────
  const clipId = 'cp-' + person.id + (d.isFocal?'f':'n');
  sel.append('defs').append('clipPath').attr('id', clipId)
    .append('ellipse').attr('cx',cxC).attr('cy',pc).attr('rx',pr).attr('ry',prh);

  // Face SVG inside clip
  sel.append('g').attr('clip-path',`url(#${clipId})`).append('g')
    .attr('transform',`translate(${cxC-pr},${pc-prh})`)
    .html(buildFaceSVG(person, Math.min(pr,prh)));

  // ── Portrait rendering ──────────────────────────────────────────────────
  const fallbackSrc = ageFallback(person);
  const hasVideo     = isVideoMedia(person);
  const hasRealImage = !!(person.media || person.gif || person.image);

  // White base always covers the cartoon face placeholder
  sel.append('ellipse').attr('cx',cxC).attr('cy',pc).attr('rx',pr).attr('ry',prh).attr('fill','white');

  if (hasVideo) {
    // Video: foreignObject clipped to oval
    const videoSrc = person.media || person.gif;
    const fo = sel.append('foreignObject')
      .attr('x', cxC-pr).attr('y', pc-prh)
      .attr('width', pr*2).attr('height', prh*2)
      .attr('clip-path', `url(#${clipId})`);
    const vid = document.createElementNS('http://www.w3.org/1999/xhtml', 'video');
    vid.src = videoSrc;
    vid.muted = true;
    vid.setAttribute('playsinline', '');
    vid.style.cssText = 'width:100%;height:100%;object-fit:cover;display:block;';
    vid.addEventListener('loadeddata', () => { vid.currentTime = 0; });
    let _cardLoops = 0;
    vid.addEventListener('ended', () => {
      _cardLoops++;
      if (_cardLoops < 2) { vid.currentTime = 0; vid.play().catch(() => {}); }
      else { vid.currentTime = 0; } // freeze on first frame after 2 loops
    });
    fo.node().appendChild(vid);
    // Only the focal card plays — queued so it starts in sync with the sidebar video.
    // Non-focal cards stay at first frame (paused).
    if (d.isFocal) queueFocalVideo(vid);
  } else {
    // Pattern-fill the ellipse — real photo or ageFallback silhouette, no clip-path artifact
    const photoSrc = hasRealImage ? getMediaSrc(person, fallbackSrc) : fallbackSrc;
    const patId = 'pt-' + person.id + (d.isFocal ? 'f' : 'n');
    sel.select('defs').append('pattern')
      .attr('id', patId)
      .attr('patternUnits', 'userSpaceOnUse')
      .attr('x', cxC - pr).attr('y', pc - prh)
      .attr('width', pr * 2).attr('height', prh * 2)
      .append('image')
      .attr('href', photoSrc)
      .attr('x', 0).attr('y', 0)
      .attr('width', pr * 2).attr('height', prh * 2)
      .attr('preserveAspectRatio', 'xMidYMid slice');
    sel.append('ellipse').attr('cx', cxC).attr('cy', pc).attr('rx', pr).attr('ry', prh)
      .attr('fill', `url(#${patId})`);
  }

  // Oval frame stroke
  sel.append('ellipse').attr('cx',cxC).attr('cy',pc).attr('rx',pr).attr('ry',prh)
    .attr('fill','none')
    .attr('stroke', frameCol)
    .attr('stroke-width', d.isFocal ? 2.2 : 1.4);
  } // end !noPortrait

  // ── Name plate ────────────────────────────────────────────────────────────
  // Tighten spacing for focal (larger oval) to stay within card bounds
  const gap      = d.isFocal ? 3 : 5;
  const ruleY    = _DATA.noPortrait ? 20 : pc + prh + gap;
  const nameY    = ruleY + 12;
  const surnameY = nameY + 12;
  const yearY    = surnameY + 11;

  sel.append('line')
    .attr('x1', cxC-20).attr('y1', ruleY)
    .attr('x2', cxC+20).attr('y2', ruleY)
    .attr('stroke', d.isFocal ? '#C89018' : '#C0A870')
    .attr('stroke-width', 0.7).attr('opacity', 0.7);

  // First name — Playfair Display, bold, the hero text
  sel.append('text').attr('x',cxC).attr('y',nameY)
    .attr('text-anchor','middle')
    .attr('font-family','Cormorant Garamond, Georgia, serif')
    .attr('font-size', d.isFocal ? '14px' : '12.5px')
    .attr('font-weight','600')
    .attr('fill', d.isFocal ? '#1A0E04' : '#1C1208')
    .text(person.fn);

  // Last name — Source Sans 3, light weight, spaced
  sel.append('text').attr('x',cxC).attr('y',surnameY)
    .attr('text-anchor','middle')
    .attr('font-family','Cormorant Garamond, Georgia, serif')
    .attr('font-size','10px').attr('font-weight','400')
    .attr('font-style','italic').attr('letter-spacing','0.4').attr('fill','#4A3820')
    .text(person.ln);

  // Birth year — tiny, beneath surname, only if known
  if(person.b) {
    const by = String(person.b).slice(0,4);
    const dy = person.d ? String(person.d).slice(0,4) : null;
    const yr = dy ? `${by} – ${dy}` : by;
    sel.append('text').attr('x',cxC).attr('y',yearY)
      .attr('text-anchor','middle')
      .attr('font-family','Source Sans 3, Segoe UI, sans-serif')
      .attr('font-size','8px').attr('font-weight','300')
      .attr('letter-spacing','0.5').attr('fill','#7A6040').attr('opacity',0.85)
      .text(yr);
  }
}

// ─── CONNECTORS ───────────────────────────────────────────────────────────────
function drawConnectors(g,pos,focusId){
  const col=THEME.connector,lw=1.2;
  // Per-family colour palette for row+2. Warm muted tones on parchment.
  // Each row+1 family gets its own colour so grandchildren groups are visually distinct.
  const PALETTE=['#9b7820','#7a5a9a','#2a7a5a','#8a3a3a','#2a5a8a','#9a602a'];
  let _col=col;
  function seg(x1,y1,x2,y2,dash,op){const o=op??(dash?0.45:0.62);const el=g.append('line').attr('class','conn').attr('x1',x1).attr('y1',y1).attr('x2',x2).attr('y2',y2).attr('stroke',_col).attr('stroke-width',dash?lw-0.5:lw).attr('opacity',o);if(dash)el.attr('stroke-dasharray','5,3');}
  function elbow(sx,sy,tx,ty,dash,op){const o=op??(dash?0.45:0.62),my=(sy+ty)/2;const el=g.append('path').attr('class','conn').attr('d',`M${sx},${sy} V${my} H${tx} V${ty}`).attr('fill','none').attr('stroke',_col).attr('stroke-width',dash?lw-0.5:lw).attr('opacity',o);if(dash)el.attr('stroke-dasharray','5,3');}
  function fan(sx,sy,targets,dash,op){if(!targets.length)return;const tY=targets[0].y,mid=(sy+tY)/2,xs=[sx,...targets.map(t=>t.x)];seg(sx,sy,sx,mid,dash,op);seg(Math.min(...xs),mid,Math.max(...xs),mid,dash,op);targets.forEach(t=>seg(t.x,mid,t.x,t.y,dash,op));}
  function connectDown(pu,cus,dash,op){if(!cus.length)return;const ids=new Set([pu.male?.id,pu.female?.id].filter(Boolean));const cur=[],half=[];cus.forEach(u=>{const c=PMAP[u.mainId],sh=c?c.p.filter(pid=>ids.has(pid)).length:0;(sh>=2?cur:half).push({x:cardCx(u,u.mainId),y:u.y});});if(cur.length)fan(pu.cx,pu.y+L.CH,cur,dash,op);if(half.length){const fx=cardCx(pu,pu.mainId);half.forEach(({x,y})=>elbow(fx,pu.y+L.CH,x,y,true,op));}}
  if(pos.rowM1.length)pos.rowM2.forEach(gp=>{if(gp.childId)elbow(gp.cx,gp.y+L.CH,cardCx(pos.rowM1[0],gp.childId),pos.rowM1[0].y,false);});
  if(pos.rowM1.length&&pos.row0.length){const src=pos.rowM1[0];const fT={x:cardCx(pos.row0[0],focusId),y:pos.row0[0].y};const fST=pos.siblings.filter(s=>!s.isHalf).map(s=>({x:cardCx(s,s.mainId),y:s.y}));fan(src.cx,src.y+L.CH,[fT,...fST],false);pos.siblings.filter(s=>s.isHalf).forEach(hs=>elbow(cardCx(src,src.mainId),src.y+L.CH,cardCx(hs,hs.mainId),hs.y,true));}
  if(pos.row1.length&&pos.row0.length)connectDown(pos.row0[0],pos.row1,false);
  // Row+2: each family group gets its own colour from the palette
  if(pos.row2.length&&pos.row1.length){
    const gcM=new Map();
    pos.row2.forEach(u=>{if(!gcM.has(u.parentMainId))gcM.set(u.parentMainId,[]);gcM.get(u.parentMainId).push(u);});
    pos.row1.forEach((r1u,idx)=>{
      const grp=gcM.get(r1u.mainId);
      if(!grp?.length)return;
      _col=PALETTE[idx%PALETTE.length]; // assign this family's colour
      connectDown(r1u,grp,false,0.45);
    });
    _col=col; // reset to default
  }
  // Former spouses: dashed line from each former spouse's right edge to focal person's left edge.
  // Drawn at card mid-height (L.ML_Y). Uses a distinct muted colour to signal past marriage.
  if(pos.formerSpouseUnits&&pos.formerSpouseUnits.length&&pos.row0.length){
    const focalUnit=pos.row0[0];
    const focalLeftX=focalUnit.cx-unitW(focalUnit)/2;
    const lineY=focalUnit.y+L.ML_Y;
    pos.formerSpouseUnits.forEach(fsu=>{
      const fsRightX=fsu.cx+unitW(fsu)/2;
      g.append('line').attr('class','conn')
        .attr('x1',fsRightX).attr('y1',lineY).attr('x2',focalLeftX).attr('y2',lineY)
        .attr('stroke','#9A8848').attr('stroke-width',1)
        .attr('stroke-dasharray','6,4').attr('opacity',0.7);
    });
  }
  // ── Succession chain (dotted, distinct colour) ─────────────────────────
  if(pos.row0.length){
    const fcu=pos.row0[0],sc='#5A3A90',sdash='2,7';
    const fy=fcu.y+L.CH/2;
    if(pos.succPrev){
      g.append('line').attr('class','conn')
        .attr('x1',pos.succPrev.cx+L.CW/2+4).attr('y1',fy)
        .attr('x2',fcu.cx-unitW(fcu)/2-4).attr('y2',fy)
        .attr('stroke',sc).attr('stroke-width',2)
        .attr('stroke-dasharray',sdash).attr('stroke-linecap','round').attr('opacity',0.6);
    }
    if(pos.succNext){
      g.append('line').attr('class','conn')
        .attr('x1',fcu.cx+unitW(fcu)/2+4).attr('y1',fy)
        .attr('x2',pos.succNext.cx-L.CW/2-4).attr('y2',fy)
        .attr('stroke',sc).attr('stroke-width',2)
        .attr('stroke-dasharray',sdash).attr('stroke-linecap','round').attr('opacity',0.6);
    }
  }
}

// ─── TREE TRANSITION ──────────────────────────────────────────────────────────
let currentFocusId=null, transitioning=false;

function transitionTo(newFocusId, animate) {
  if(transitioning)return;
  if(animate&&newFocusId===currentFocusId)return;
  transitioning=true;
  stopAllVideos();
  let hg, pos, cards, marriages;
  try {
    hg=buildHourglass(newFocusId); pos=calculateLayout(hg);
    cards=buildCardData(pos,newFocusId); marriages=buildMarriageData(pos);
  } catch(e) {
    console.error('Eliadora: failed to build hourglass for', newFocusId, e);
    transitioning=false; return;
  }
  const FADE=animate?150:0,MOVE=animate?450:0,TOTAL=FADE+MOVE+60;
  ROOT.attr('width',pos.svgW).attr('height',pos.svgH);
  bgR.attr('width',pos.svgW).attr('height',pos.svgH);
  ROOT.select('#conn-clip-rect').attr('width',pos.svgW).attr('height',pos.svgH);
  updateGrain(pos);
  connL.selectAll('.conn').transition().duration(FADE).attr('opacity',0).remove();
  const mSel=connL.selectAll('.ml').data(marriages,d=>d.key);
  mSel.exit().transition().duration(FADE).attr('opacity',0).remove();
  mSel.enter().append('line').attr('class','ml').attr('stroke','#9A7820').attr('stroke-width',1.2).attr('x1',d=>d.x1).attr('y1',d=>d.y1).attr('x2',d=>d.x2).attr('y2',d=>d.y2).attr('opacity',0).transition().duration(200).delay(FADE+MOVE-100).attr('opacity',d=>d.op);
  mSel.transition().duration(MOVE).delay(FADE).attr('x1',d=>d.x1).attr('y1',d=>d.y1).attr('x2',d=>d.x2).attr('y2',d=>d.y2).attr('opacity',d=>d.op);
  const cSel=cardL.selectAll('.card-g').data(cards,d=>d.id);
  cSel.exit().transition().duration(FADE).attr('opacity',0).remove();
  const entered=cSel.enter().append('g').attr('class','card-g').attr('transform',d=>`translate(${d.x},${d.y})`).attr('opacity',0).on('click',(ev,d)=>onCardClick(d.id));
  entered.each(function(d){drawCardInto(d3.select(this),d);});
  entered.transition().duration(200).delay(FADE+MOVE-80).attr('opacity',d=>d.opacity);
  cSel.on('click',(ev,d)=>onCardClick(d.id));
  cSel.each(function(d){drawCardInto(d3.select(this),d);});
  cSel.transition().duration(MOVE).delay(FADE).attr('transform',d=>`translate(${d.x},${d.y})`).attr('opacity',d=>d.opacity);
  setTimeout(()=>{
    drawConnectors(connL,pos,newFocusId);
    updateLabels(pos);
    updateTimeline(newFocusId);
    if(animate){scrollToFocus(pos);if(!sidebarHidden)openSidebarFor(newFocusId);}
    currentFocusId=newFocusId;
    transitioning=false;
    // Start all focal videos together — card + sidebar in the same tick
    startFocalVideos();
  },TOTAL);
}

function onCardClick(personId) {
  transitionTo(personId, true);
}

function scrollToFocus(pos) {
  const c = document.getElementById('tree-container');
  const sbVisible = sidebarEl.classList.contains('open') ? (sidebarEl.offsetWidth - 34) : 0;
  const availW    = c.clientWidth - sbVisible;
  const scrollLeft = pos.focalCx - availW / 2;
  const focalRowY  = pos.focalRowY ?? (L.PY + L.RH * 2);
  const scrollTop  = Math.max(0, focalRowY - c.clientHeight * 0.30);
  c.scrollTo({ left: scrollLeft, top: scrollTop, behavior: 'smooth' });
}

// ─── SUCCESSION TIMELINE ─────────────────────────────────────────────────────
function getDynastyColor(idx) {
  if (idx <= 18) return '#9A6C10'; // Piast
  if (idx <= 20) return '#7A2E18'; // Anjou
  if (idx <= 27) return '#165030'; // Jagiellonian
  return '#1C2E6A';                 // Elected kings
}
function updateTimeline(focusId) {
  const tlEl  = document.getElementById('succession-timeline');
  const inner = document.getElementById('succ-tl-inner');
  const chain = (_DATA.succession || []);
  if (!chain.length || _DATA.noTimeline) {
    tlEl.classList.remove('active');
    document.body.classList.remove('has-timeline');
    return;
  }
  tlEl.classList.add('active');
  document.body.classList.add('has-timeline');
  const si = chain.indexOf(focusId);
  const opacs = [1, 0.94, 0.86, 0.78, 0.70, 0.62, 0.55, 0.49, 0.43];
  inner.innerHTML = '';
  chain.forEach((id, i) => {
    const p = PMAP[id];
    if (!p) return;
    const dist = Math.abs(i - si);
    const div  = document.createElement('div');
    div.className = 'tl-item' + (i === si ? ' tl-current' : '');
    div.style.opacity = opacs[Math.min(dist, opacs.length - 1)];
    if (i !== si) div.style.borderLeftColor = getDynastyColor(i);
    div.setAttribute('data-id', id);
    div.onclick = () => transitionTo(id, true);
    const years = (p.rs||p.re) ? [p.rs,p.re].filter(Boolean).join('–') : [p.b,p.d].filter(Boolean).join('–');
    div.innerHTML =
      `<div class="tl-name">${p.fn || ''}</div>` +
      (p.ln ? `<div class="tl-epithet">${p.ln}</div>` : '') +
      (years ? `<div class="tl-years">${years}</div>` : '') +
      (p.map ? `<img class="tl-map" src="${p.map}" alt="" loading="lazy">` : '');
    inner.appendChild(div);
  });
  setTimeout(() => {
    const cur = inner.querySelector('.tl-current');
    if (cur) inner.scrollTo({ top: cur.offsetTop - inner.clientHeight / 2 + cur.offsetHeight / 2, behavior: 'smooth' });
  }, 0);
}

// ─── SIDEBAR LOGIC ─────────────────────────────────────────────────────────────
// sidebarHidden: true when user manually closed — stays closed until manually re-opened.
// When re-opened manually, reverts to auto-open behaviour on every node click.
let sidebarHidden = false;
let _sbPortraitVideo = null;

// ── Sidebar video controls — use event delegation on the persistent sidebar ───
const sidebarInnerEl = document.getElementById('sb-inner') || document.getElementById('sidebar');
sidebarInnerEl.addEventListener('click', e => {
  const btn = e.target.closest('#sb-vid-play');
  if (!btn) return;
  const vid = _sbPortraitVideo;
  if (!vid) return;
  if (vid.paused) {
    vid.play().catch(() => {});
    btn.textContent = '⏸';
  } else {
    vid.pause();
    btn.textContent = '▶';
  }
});
sidebarInnerEl.addEventListener('click', e => {
  const icon = e.target.closest('#sb-vid-vol-icon');
  if (!icon) return;
  const vol = document.getElementById('sb-vid-vol');
  if (!vol || !_sbPortraitVideo) return;
  if (_sbPortraitVideo.muted || _sbPortraitVideo.volume === 0) {
    _sbPortraitVideo.muted = false;
    vol.value = vol.dataset.last || 0.6;
    _sbPortraitVideo.volume = parseFloat(vol.value);
    icon.textContent = '🔊';
  } else {
    vol.dataset.last = vol.value;
    _sbPortraitVideo.muted = true;
    vol.value = 0;
    icon.textContent = '🔇';
  }
});
sidebarInnerEl.addEventListener('input', e => {
  const slider = e.target.closest('#sb-vid-vol');
  if (!slider || !_sbPortraitVideo) return;
  _sbPortraitVideo.volume = parseFloat(slider.value);
  _sbPortraitVideo.muted  = (slider.value == 0);
  const icon = document.getElementById('sb-vid-vol-icon');
  if (icon) icon.textContent = (slider.value == 0) ? '🔇' : '🔊';
});

const sidebarEl = document.getElementById('sidebar');
const sbArrow    = document.getElementById('sb-arrow');

function openSidebarFor(personId) {
  updateSidebar(personId);
  sidebarEl.classList.add('open');
  sbArrow.innerHTML = '&#9654;';  // ▶ = "click to close"
}
function closeSidebar(manual) {
  sidebarEl.classList.remove('open');

}

document.getElementById('sb-toggle').addEventListener('click', () => {
  if (sidebarEl.classList.contains('open')) {
    closeSidebar(true);  // manual close → stays hidden
  } else {

    openSidebarFor(currentFocusId);

});

// ─── SIDEBAR CONTENT UPDATE ───────────────────────────────────────────────────
function updateSidebar(personId) {
  if (editorActive) return;  // don't overwrite the edit form
  const person = PMAP[personId];
  if (!person) return;

  // ── Profile photo ──────────────────────────────────────────────────────────
  const pr = 96, prh = 108, cx = 110, cy = 120;
  const sbSvg = d3.select('#sb-photo-svg');
  sbSvg.selectAll('*').remove();

  // Background ring matching card colour
  const bg  = person.g === 'F' ? '#F5EBE8' : '#EBF0F5';
  const rim = person.g === 'F' ? '#A87060' : '#6A92A8';
  sbSvg.append('ellipse').attr('cx',cx).attr('cy',cy).attr('rx',pr+5).attr('ry',prh+5).attr('fill',bg).attr('stroke',rim).attr('stroke-width',1.2);

  const clipId = 'sb-cp-' + person.id;
  sbSvg.append('defs').append('clipPath').attr('id',clipId).append('ellipse').attr('cx',cx).attr('cy',cy).attr('rx',pr).attr('ry',prh);
  sbSvg.append('g').attr('clip-path',`url(#${clipId})`).append('g').attr('transform',`translate(${cx-pr},${cy-prh})`).html(buildFaceSVG(person,Math.min(pr,prh)));
  sbSvg.append('ellipse').attr('cx',cx).attr('cy',cy).attr('rx',pr).attr('ry',prh).attr('clip-path',`url(#${clipId})`).attr('fill','white');
  // Sidebar portrait: video plays in sidebar only — no loop, starts paused
  const sbFallback = ageFallback(person);
  const sbMediaSrc = getMediaSrc(person, sbFallback);
  const sbVidControls = document.getElementById('sb-vid-controls');
  if (isVideoMedia(person)) {
    const fo = sbSvg.append('foreignObject')
      .attr('x', cx-pr).attr('y', cy-prh)
      .attr('width', pr*2).attr('height', prh*2)
      .attr('clip-path', `url(#${clipId})`);
    const vid = document.createElementNS('http://www.w3.org/1999/xhtml','video');
    vid.setAttribute('playsinline','');
    vid.muted = true;
    vid.loop  = true;
    vid.style.width='100%'; vid.style.height='100%';
    vid.style.objectFit='cover'; vid.style.display='block';
    vid.src = sbMediaSrc;
    fo.node().appendChild(vid);
    _sbPortraitVideo = vid;
    queueFocalVideo(vid);
    document.getElementById('sb-vid-play').textContent = '⏸';
    document.getElementById('sb-vid-vol-icon').style.display = 'none';
    document.getElementById('sb-vid-vol').style.display = 'none';
    sbVidControls.style.display = '';
  } else {
    sbSvg.append('image').attr('href',sbMediaSrc).attr('x',cx-pr).attr('y',cy-prh).attr('width',pr*2).attr('height',prh*2).attr('clip-path',`url(#${clipId})`).attr('preserveAspectRatio','xMidYMid slice');
    _sbPortraitVideo = null;
    sbVidControls.style.display = 'none';
  }
  sbSvg.append('ellipse').attr('cx',cx).attr('cy',cy).attr('rx',pr).attr('ry',prh).attr('fill','none').attr('stroke',rim).attr('stroke-width',1.8);

  // ── Full name + flags ──────────────────────────────────────────────────────
  const displayName = person.fullName || `${person.fn} ${person.ln}`;
  const flags = getFlags(person.nat);
  document.getElementById('sb-fullname').textContent = flags ? `${displayName}  ${flags}` : displayName;

  // ── Dates + age ────────────────────────────────────────────────────────────
  const now = new Date().getFullYear();
  const lines = [];
  if (person.rs || person.re) {
    lines.push(`${t('reigned')} ${[person.rs, person.re].filter(Boolean).join('–')}`);
  }
  if (person.b) {
    let bl = `${t('born')} ${formatDate(person.b)}`;
    if (person.bp) bl += `  ·  ${person.bp}`;
    lines.push(bl);
  }
  if (person.d) {
    let dl = `${t('died')} ${formatDate(person.d)}`;
    if (person.dp) dl += `  ·  ${person.dp}`;
    lines.push(dl);
  }
  let ageBadge = '';
  if (person.b) {
    const by = birthYear(person.b), dy = person.d ? birthYear(person.d) : now;
    if (by && dy) {
      const yrs = dy - by;
      ageBadge = person.d
        ? `<span class="sb-age">${t('lived')} ${yrs} ${t('years')}</span>`
        : `<span class="sb-age">${t('age')} ${yrs} ${t('years')}</span>`;
    }
  }
  document.getElementById('sb-info').innerHTML = lines.join('<br>') + (ageBadge ? '<br>' + ageBadge : '');

  // ── Biography ──────────────────────────────────────────────────────────────
  document.getElementById('sb-bio-title').textContent = t('biography');
  const bioEl = document.getElementById('sb-bio-text');
  // bio can be a multilingual object {pl,en,es,fr} or a plain string (legacy)
  const bioText = person.bio
    ? (typeof person.bio === 'object' ? (person.bio[lang] || person.bio.pl || '') : person.bio)
    : '';
  if (bioText) {
    bioEl.textContent = bioText;
    bioEl.style.color = '#3a2810';
    bioEl.style.fontStyle = 'normal';
  } else {
    bioEl.textContent = t('bioPlaceholder');
    bioEl.style.color = '#b8a888';
    bioEl.style.fontStyle = 'italic';
  }

  // ── Photo gallery ──────────────────────────────────────────────────────────
  document.getElementById('sb-gallery-title').textContent = t('photos');
  const grid = document.getElementById('sb-gallery-grid');
  const noPhotos = document.getElementById('sb-no-photos');
  grid.innerHTML = '';

  const gallerySection = document.getElementById('sb-gallery-title').closest('.sb-section');
  if (person.ph && person.ph.length > 0) {
    gallerySection.style.display = '';
    noPhotos.style.display = 'none';
    person.ph.forEach(photo => {
      const thumb = document.createElement('div');
      thumb.className = 'sb-thumb';
      const img = document.createElement('img');
      img.src = photo.src; img.alt = photo.caption || '';
      img.loading = 'lazy';
      thumb.appendChild(img);
      thumb.addEventListener('click', () => openLightbox(photo.src, photo.caption));
      grid.appendChild(thumb);
    });
  } else {
    gallerySection.style.display = 'none';
  }

  // Inject edit button + add person buttons
  injectSidebarActions(personId);
}

// ── Link to existing person (instead of creating new) ────────────────────────
// Used when the person being connected (parent/child/spouse) already exists in the tree.
// ── Parent slot helper ────────────────────────────────────────────────────────
// Assigns a parent to the correct slot by gender, ignoring stale/invalid IDs.
// Returns 'ok' on success, 'filled' if the gender slot is already occupied by a valid person.
function applyParentLink(childPerson, parentId, parentGender) {
  // Start from only the VALID existing parents (those still in PMAP)
  const validP = (childPerson.p || []).filter(id => id && PMAP[id]);
  const hasValidMale   = validP.some(id => PMAP[id].g === 'M');
  const hasValidFemale = validP.some(id => PMAP[id].g === 'F');

  if (parentGender === 'M' && hasValidMale)   return 'filled';
  if (parentGender === 'F' && hasValidFemale) return 'filled';

  // Build new p[]: father first (index 0), mother second (index 1)
  const father = parentGender === 'M' ? parentId : (validP.find(id => PMAP[id].g === 'M') || null);
  const mother = parentGender === 'F' ? parentId : (validP.find(id => PMAP[id].g === 'F') || null);

  if (father && mother) childPerson.p = [father, mother];
  else if (father)      childPerson.p = [father];
  else if (mother)      childPerson.p = [mother];
  else                  childPerson.p = [parentId];

  return 'ok';
}

// ── Circular ancestry check ───────────────────────────────────────────────────
// Returns true if 'ancestorId' is already an ancestor of 'personId'.
// Prevents wiring A as parent of B when A is already B's descendant.
function isAncestor(ancestorId, personId, visited = new Set()) {
  if (ancestorId === personId) return true;
  if (visited.has(personId)) return false;
  visited.add(personId);
  const p = PMAP[personId];
  if (!p || !p.p) return false;
  return p.p.some(pid => pid && isAncestor(ancestorId, pid, visited));
}

// ── Duplicate detection ───────────────────────────────────────────────────────
// Returns any existing person matching fn + ln + birth year (case-insensitive).
// Excludes the person being edited (originalId) to allow saving without change.
function findDuplicate(fn, ln, bRaw, excludeId) {
  const fnL = fn.toLowerCase(), lnL = ln.toLowerCase();
  const byear = bRaw ? String(bRaw).split('-')[0] : null;
  return PEOPLE.find(p => {
    if (p.id === excludeId) return false;
    if (p.fn.toLowerCase() !== fnL || p.ln.toLowerCase() !== lnL) return false;
    if (!byear) return true; // name match alone is enough to warn
    const pByear = p.b ? String(p.b).split('-')[0] : null;
    return !pByear || pByear === byear;
  }) || null;
}

// ── Age sanity check ─────────────────────────────────────────────────────────
// Returns a warning string if dates are suspicious, or null if all fine.
// Checks: death before birth, parent born after child.
function ageSanityWarning(person, parentIds) {
  const warnings = [];
  const by = person.b ? parseInt(String(person.b).split('-')[0], 10) : null;
  const dy = person.d ? parseInt(String(person.d).split('-')[0], 10) : null;
  if (by && dy && dy < by) warnings.push(`Rok śmierci (${dy}) wcześniej niż rok urodzenia (${by}). / Death year (${dy}) before birth year (${by}).`);
  (parentIds || []).forEach(pid => {
    const par = PMAP[pid]; if (!par) return;
    const pby = par.b ? parseInt(String(par.b).split('-')[0], 10) : null;
    if (by && pby && pby >= by) warnings.push(`${par.fn} ${par.ln} urodzony/a ${pby} — później niż dziecko (${by}). / ${par.fn} ${par.ln} born ${pby}, same year or after child (${by}).`);
  });
  return warnings.length ? warnings.join('\n') : null;
}

function linkExistingPerson() {
  const selectedId = document.getElementById('ef-link-select')?.value;
  if (!selectedId) { showEditError('Wybierz osobę z listy / Select a person from the list.'); return; }
  const spec = editorConnectionSpec;
  if (!spec) return;

  const anchor   = PMAP[spec.anchorId];   // the person we're adding FROM
  const existing = PMAP[selectedId];       // the person already in the tree
  if (!anchor || !existing) return;

  if (spec.type === 'parent') {
    if (isAncestor(spec.anchorId, selectedId)) {
      showEditError(`Błąd kołowy: ${existing.fn} ${existing.ln} jest już potomkiem tej osoby.\nCircular: ${existing.fn} ${existing.ln} is already a descendant.`);
      return;
    }
    const result = applyParentLink(anchor, selectedId, existing.g);
    if (result === 'filled') { showEditError('Rodzic tej płci już istnieje / Parent of this gender already linked.'); return; }

  } else if (spec.type === 'child') {
    if (isAncestor(selectedId, spec.anchorId)) {
      showEditError(`Błąd kołowy: ${anchor.fn} ${anchor.ln} jest już potomkiem tej osoby.\nCircular: ${anchor.fn} ${anchor.ln} is already a descendant.`);
      return;
    }
    const result = applyParentLink(existing, spec.anchorId, anchor.g);
    if (result === 'filled') { showEditError('Ta osoba już ma rodzica tej płci / Parent of this gender already linked.'); return; }

  } else if (spec.type === 'spouse') {
    if (selectedId === spec.anchorId) { showEditError('Osoba nie może być własnym małżonkiem. / A person cannot be their own spouse.'); return; }
    if (!anchor.s.includes(selectedId))      anchor.s   = [...anchor.s,   selectedId];
    if (!existing.s.includes(spec.anchorId)) existing.s = [...existing.s, spec.anchorId];
  }

  rebuildPMAP();
  savePeople();
  editorActive = false;
  editorConnectionSpec = null;
  restoreSidebarView();
  const fid = currentFocusId;
  currentFocusId = null;
  sidebarReturnId = fid;
  transitionTo(fid, false);
  setTimeout(() => {
    sidebarReturnId = null;
    if (!sidebarHidden && fid) { updateSidebar(fid); sidebarEl.classList.add('open'); }
  }, 100);
}
// ── Reset to data file ─────────────────────────────────────────────────────────
function resetToDataFile() {
  if (!confirm('Przywrócić oryginalne dane z pliku?\nReset to original data file?\n\nWszystkie zmiany wprowadzone w przeglądarce zostaną utracone.\nAll browser edits will be lost.')) return;
  try { localStorage.removeItem('eliadora_people'); } catch(e) {}
  location.reload();
}

// ── Delete a person from the tree ─────────────────────────────────────────────
function deletePerson(personId) {
  const person = PMAP[personId];
  if (!person) return;

  // Protect the default focal person — deleting them breaks the whole tree
  if (personId === FOCUS_ID) {
    alert(`Nie można usunąć ${person.fn} ${person.ln} — ta osoba jest główną osobą drzewa (defaultFocus w pliku danych).\n\nCannot delete ${person.fn} ${person.ln} — this person is the tree's default focus.`);
    return;
  }

  const name = `${person.fn} ${person.ln}`;
  // Count children who will lose a parent
  const childrenAffected = PEOPLE.filter(p => (p.p || []).includes(personId));
  const childWarn = childrenAffected.length
    ? `\n\n⚠ ${childrenAffected.length} osób straci rodzica / ${childrenAffected.length} person(s) will lose a parent:\n${childrenAffected.map(c => `  ${c.fn} ${c.ln}`).join('\n')}`
    : '';

  if (!confirm(`Usunąć ${name} z drzewa?\nDelete ${name} from the tree?${childWarn}\n\nTej operacji nie można cofnąć. / This cannot be undone.`)) return;

  PEOPLE.forEach(p => {
    if (p.p) p.p = p.p.filter(id => id !== personId);
    if (p.s) p.s = p.s.filter(id => id !== personId);
  });
  const idx = PEOPLE.findIndex(p => p.id === personId);
  if (idx !== -1) PEOPLE.splice(idx, 1);
  rebuildPMAP(); savePeople();
  const newFocal = PMAP[FOCUS_ID] ? FOCUS_ID : PEOPLE[0]?.id;
  if (newFocal) { currentFocusId = null; restoreSidebarView(); transitionTo(newFocal, false); }
}

// ── Unlink a relationship without deleting either person ──────────────────────
function unlinkRelationship(personId, otherId, type) {
  const person = PMAP[personId], other = PMAP[otherId];
  if (!person || !other) return;
  if (type === 'parent') {
    person.p = (person.p || []).filter(id => id !== otherId);
  } else if (type === 'spouse') {
    person.s = (person.s || []).filter(id => id !== otherId);
    other.s  = (other.s  || []).filter(id => id !== personId);
  }
  rebuildPMAP(); savePeople();
  restoreSidebarView();
  const fid = currentFocusId; currentFocusId = null;
  transitionTo(fid, false);
  setTimeout(() => { if (!sidebarHidden && fid) { updateSidebar(fid); sidebarEl.classList.add('open'); } }, 100);
}

function savePeople() {
  try {
    localStorage.setItem('eliadora_people', JSON.stringify(PEOPLE));
  } catch(e) { alert('Could not save to browser storage.'); }
  updateOrphanBtn();
}

  a.click(); URL.revokeObjectURL(a.href);
}
