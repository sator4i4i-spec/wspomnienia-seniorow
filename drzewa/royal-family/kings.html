<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drzewo polskich królów · Kings' Tree</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500;1,600&family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Great+Vibes&family=UnifrakturMaguntia&family=Pinyon+Script&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="kings-styles.css">

<!-- Back-to-menu button -->
<style>
#back-btn {
  position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
  z-index: 9999;
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 11px; font-style: italic; letter-spacing: 1.8px;
  color: #8B1A2A; background: rgba(250,246,238,0.92);
  border: 1px solid #C8A090; border-radius: 2px;
  padding: 5px 18px; cursor: pointer;
  backdrop-filter: blur(4px);
  transition: background 0.18s, color 0.18s;
  text-decoration: none; display: inline-block;
}
#back-btn:hover { background: rgba(240,228,220,0.98); color: #5A0A14; }
</style>

<script>
// Tweakable defaults — host may rewrite this block.
window.TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "bg": "plain",
  "density": "spacious",
  "cardStyle": "medallion"
}/*EDITMODE-END*/;
</script>
</head>
<body class="bg-paper">

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- HEADER                                                            -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<header id="app-header">
  <div id="brand">
    <svg id="brand-crown" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="crown-grad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%"  stop-color="#F0D595"/>
          <stop offset="60%" stop-color="#C39036"/>
          <stop offset="100%" stop-color="#8C6418"/>
        </linearGradient>
      </defs>
      <rect x="6" y="32" width="36" height="8" rx="2"
            fill="url(#crown-grad)" stroke="#5A3A08" stroke-width="1"/>
      <path d="M 6 32 L 8 14 L 16 22 L 24 10 L 32 22 L 40 14 L 42 32 Z"
            fill="url(#crown-grad)" stroke="#5A3A08" stroke-width="1" stroke-linejoin="round"/>
      <circle cx="16" cy="22" r="2.4" fill="#C8253E" stroke="#5A0E16" stroke-width="0.6"/>
      <circle cx="24" cy="13" r="3.0" fill="#1F3A6B" stroke="#0E1C36" stroke-width="0.6"/>
      <circle cx="32" cy="22" r="2.4" fill="#C8253E" stroke="#5A0E16" stroke-width="0.6"/>
      <circle cx="14" cy="36" r="1.4" fill="#F0E0A0"/>
      <circle cx="24" cy="36" r="1.4" fill="#F0E0A0"/>
      <circle cx="34" cy="36" r="1.4" fill="#F0E0A0"/>
      <path d="M 8 14 L 16 21 L 24 11" stroke="rgba(255,240,200,0.5)" stroke-width="1" fill="none"/>
    </svg>
    <div id="brand-text">
      <div id="brand-title">Drzewo polskich królów</div>
      <div id="brand-sub">historia opowiadana przez korony</div>
    </div>
  </div>

  <div id="header-controls">
    <button id="search-btn" class="hdr-btn" title="Szukaj (/)" aria-label="Search">
      <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
        <circle cx="7" cy="7" r="5" stroke="currentColor" stroke-width="1.8"/>
        <line x1="11" y1="11" x2="14" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
    <div id="lang-switch">
      <button class="lang-btn active" data-lang="pl">PL</button>
      <button class="lang-btn" data-lang="en">EN</button>
      <button class="lang-btn" data-lang="es">ES</button>
      <button class="lang-btn" data-lang="fr">FR</button>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- MAIN                                                              -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="main">

  <aside id="rail">
    <div id="rail-title">Poczet królów</div>
    <div id="rail-scroll"><!-- populated by kings-app.js --></div>
  </aside>

  <main id="tree-wrap">
    <svg id="tree-svg"></svg>
  </main>

  <aside id="sidebar">
    <button id="sb-handle" data-label="KARTA · BIO" aria-label="Otwórz/zamknij kartę">
      <span id="sb-arrow">◀</span>
    </button>
    <button id="edit-pencil-btn" title="Edytuj dane" aria-label="Toggle edit mode">✏️</button>
    <div id="sb-content"><!-- populated by kings-app.js --></div>
  </aside>

</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- SEARCH OVERLAY                                                    -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="search-overlay">
  <div id="search-box" onclick="event.stopPropagation()">
    <input id="search-input" type="text" autocomplete="off" spellcheck="false"
           placeholder="Szukaj imienia albo dynastii…">
    <div id="search-results"></div>
  </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- TWEAKS PANEL                                                      -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<div id="tweaks-panel">
  <div class="tweaks-head">
    <span>USTAWIENIA · TWEAKS</span>
    <button id="tweaks-close" class="tweaks-close" aria-label="Close">×</button>
  </div>
  <div class="tweaks-body">
    <div class="tweak-section" id="tw-bg">
      <div class="tweak-label">TŁO / BACKGROUND</div>
      <div class="tweak-row">
        <button class="tweak-btn" data-val="paper">pergamin</button>
        <button class="tweak-btn" data-val="linen">len</button>
        <button class="tweak-btn" data-val="plain">gładki</button>
      </div>
    </div>
    <div class="tweak-section" id="tw-density">
      <div class="tweak-label">DRZEWO / TREE</div>
      <div class="tweak-row">
        <button class="tweak-btn" data-val="compact">gęste</button>
        <button class="tweak-btn" data-val="spacious">luźne</button>
      </div>
    </div>
    <div class="tweak-section" id="tw-cards">
      <div class="tweak-label">KARTY / CARDS</div>
      <div class="tweak-row">
        <button class="tweak-btn" data-val="medallion">medalion</button>
        <button class="tweak-btn" data-val="heraldic">herbowe</button>
        <button class="tweak-btn" data-val="storybook">baśniowe</button>
      </div>
    </div>
  </div>
</div>

<!-- Back to main menu -->
<a id="back-btn" href="index.html">← Chronica Originum</a>

<!-- ═══════════════════════════════════════════════════════════════ -->
<!-- SCRIPTS                                                           -->
<!-- ═══════════════════════════════════════════════════════════════ -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="kings-poland.js"></script>
<script src="kings-engine.js"></script>
<script src="kings-app.js"></script>
<script src="kings-music.js"></script>

</body>
</html>
